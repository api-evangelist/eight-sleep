principles:
- name: Visibility
  description: Track the Autopilot membership tier and renewal date plus the upfront hardware cost; no API usage to inspect.
- name: Allocation
  description: Map hardware and membership to a household or individual sleeper; there is no API-key-level allocation.
- name: Optimization
  description: Choose the Autopilot tier that matches needed features; weigh annual vs monthly; there is no API spend to optimize.
- name: Accountability
  description: Review membership renewals against value received; cancel or downgrade unused tiers.
