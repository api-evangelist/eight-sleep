description: >-
  FinOps view of Eight Sleep spend. Eight Sleep is a consumer hardware and
  subscription business, not a usage-metered API platform. There is NO official
  public API and therefore no API-call billing. Cost consists of a one-time
  Pod (and optional Base) hardware purchase plus a recurring Autopilot
  membership. The unofficial community client API carries no incremental fee
  because it rides on the same consumer account and membership. There is no
  usage-based API metering to allocate or optimize.
notes: >-
  No usage-based API charges exist. Cost management here is consumer
  subscription management (the Autopilot membership) plus the upfront hardware
  outlay. Verify current prices at https://www.eightsleep.com.
