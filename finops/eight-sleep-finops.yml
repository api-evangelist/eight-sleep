  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - tier
- name: api_requests
  description: >-
    Unofficial community API calls. Not metered or billed by Eight Sleep -
    there is no official API and no per-call charge.
  unit: requests
  aggregation: sum
  dimensions:
